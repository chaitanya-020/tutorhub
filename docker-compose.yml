services:
  postgres:
    image: postgres:17
    container_name: tutorhub-postgres
    environment:
      POSTGRES_DB: tutorhub
      POSTGRES_USER: tutorhub
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - tutorhub-pgdata:/var/lib/postgresql/data

volumes:
  tutorhub-pgdata: