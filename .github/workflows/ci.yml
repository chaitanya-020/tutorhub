name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Testcontainers needs Docker. GitHub-hosted Ubuntu runners have it
      # preinstalled, so no setup step is required — the integration test
      # will start a real Postgres container automatically.
      - name: Build and test
        run: ./mvnw clean verify -B