
tutorhub:
  mail:
    from: ${MAIL_FROM:noreply@tutorhub.local}
  reminders:
    cron: ${REMINDERS_CRON:0 0 * * * *}   # hourly by default

spring:

  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true



  application:
    name: tutorhub
  datasource:
    url: jdbc:postgresql://localhost:5432/tutorhub
    username: tutorhub
    password: secret
  jpa:
    hibernate:
      ddl-auto: validate      # Flyway owns the schema, not Hibernate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

management:
  endpoint:
    health:
      show-details: always    # so the health check shows the DB status
jwt:
  secret: ${JWT_SECRET:}
  expiration-ms: 86400000   # 24 hours

logging:
  level:
    org.hibernate.SQL: debug